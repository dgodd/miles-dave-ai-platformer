name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            name: macOS
            suffix: macos
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            name: Windows
            suffix: windows.exe
            target: x86_64-pc-windows-gnu
          - os: ubuntu-latest
            name: WASM
            suffix: wasm
            target: wasm32-unknown-unknown

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install mingw (macOS → Windows cross)
        if: matrix.name == 'Windows'
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: platformer-${{ matrix.suffix }}
          path: target/${{ matrix.target }}/release/platformer${{ matrix.name == 'Windows' && '.exe' || '' }}

  release:
    name: Create GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
